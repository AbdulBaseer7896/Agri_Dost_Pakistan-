# Render.com infrastructure-as-code config
# Reference: https://render.com/docs/blueprint-spec
# This file lets you deploy with one click using "New > Blueprint" on Render
services:
  - type: web
    name: agri-dost-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn agri_dost.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false   # set this manually in Render dashboard from your Postgres
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # e.g. https://your-frontend.netlify.app
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
